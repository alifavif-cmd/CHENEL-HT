name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/htjulianto/app
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          B64="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADklEQVQI12P4z8BQDwAEgAF/QualIQAAAABJRU5ErkJggg=="
          for f in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            echo $B64 | base64 -d > app/src/main/res/$f/ic_launcher.png
            cp app/src/main/res/$f/ic_launcher.png app/src/main/res/$f/ic_launcher_round.png
          done

          cat > settings.gradle << 'SEOF'
          rootProject.name = "HTJulianto"
          include ':app'
          SEOF

          cat > build.gradle << 'BEOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          BEOF

          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          GEOF

          cat > app/build.gradle << 'ABEOF'
          plugins { id 'com.android.application' }
          android {
            namespace "com.htjulianto.app"
            compileSdk 34
            defaultConfig {
              applicationId "com.htjulianto.app"
              minSdk 21
              targetSdk 34
              versionCode 2
              versionName "2.0"
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_1_8
              targetCompatibility JavaVersion.VERSION_1_8
            }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          ABEOF

          # ── AndroidManifest ──────────────────────────────────────────
          python3 << 'PYEOF'
          manifest = '''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.RECORD_AUDIO"/>
            <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
            <uses-permission android:name="android.permission.WAKE_LOCK"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <application
              android:label="HT Julianto"
              android:icon="@mipmap/ic_launcher"
              android:usesCleartextTraffic="true">
              <activity
                android:name=".MainActivity"
                android:exported="true"
                android:screenOrientation="portrait"
                android:configChanges="orientation|screenSize|keyboardHidden">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <service
                android:name=".RadioService"
                android:exported="false"
                android:foregroundServiceType="mediaPlayback"/>
            </application>
          </manifest>'''
          open('app/src/main/AndroidManifest.xml','w').write(manifest)
          PYEOF

          # ── MainActivity.java ─────────────────────────────────────────
          python3 << 'PYEOF'
          java = r'''package com.htjulianto.app;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.PowerManager;
          import android.speech.tts.TextToSpeech;
          import android.webkit.JavascriptInterface;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import java.util.Locale;

          public class MainActivity extends Activity implements TextToSpeech.OnInitListener {
            private WebView w;
            private TextToSpeech tts;
            private boolean ttsReady = false;
            private Handler uiHandler = new Handler(Looper.getMainLooper());
            private PowerManager.WakeLock wakeLock;

            public class TTSBridge {
              @JavascriptInterface
              public void speak(final String text) {
                uiHandler.post(new Runnable() {
                  @Override public void run() {
                    if (tts != null && ttsReady) {
                      tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, "ht_tts");
                    }
                  }
                });
              }
              @JavascriptInterface
              public void stop() {
                uiHandler.post(new Runnable() {
                  @Override public void run() {
                    if (tts != null && ttsReady) tts.stop();
                  }
                });
              }
              @JavascriptInterface
              public boolean isReady() { return ttsReady; }
            }

            @Override protected void onCreate(Bundle s) {
              super.onCreate(s);

              // ── WakeLock: CPU tetap aktif walau layar mati ──────────
              PowerManager pm = (PowerManager) getSystemService(POWER_SERVICE);
              wakeLock = pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "HTJulianto::RadioLock");
              wakeLock.acquire();

              // ── ForegroundService: cegah Android bunuh app ──────────
              Intent svcIntent = new Intent(this, RadioService.class);
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                startForegroundService(svcIntent);
              } else {
                startService(svcIntent);
              }

              // ── TTS ─────────────────────────────────────────────────
              tts = new TextToSpeech(this, this);

              // ── WebView setup ────────────────────────────────────────
              w = new WebView(this);
              setContentView(w);

              WebSettings ws = w.getSettings();
              ws.setJavaScriptEnabled(true);
              ws.setDomStorageEnabled(true);
              ws.setDatabaseEnabled(true);
              ws.setMediaPlaybackRequiresUserGesture(false);
              ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
              ws.setBlockNetworkLoads(false);
              // Izinkan WebRTC berjalan di background
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                ws.setOffscreenPreRaster(true);
              }

              w.addJavascriptInterface(new TTSBridge(), "Android");

              w.setWebViewClient(new WebViewClient() {
                @Override
                public void onPageFinished(WebView view, String url) {
                  uiHandler.postDelayed(new Runnable() {
                    @Override public void run() {
                      view.evaluateJavascript(
                        "(function(){" +
                        "  if(typeof window.speakAfterDing === 'undefined') return;" +
                        "  window.speakAfterDing = function(text, doneCb) {" +
                        "    try{ window.playDingDong(); } catch(e){}" +
                        "    setTimeout(function(){" +
                        "      try{ Android.speak(text); } catch(e){}" +
                        "      if(doneCb) setTimeout(doneCb, Math.max(3500, text.length * 85));" +
                        "    }, 2000);" +
                        "  };" +
                        "  window._usingAndroidTTS = true;" +
                        "})();",
                        null
                      );
                    }
                  }, 800);
                }
              });

              w.setWebChromeClient(new WebChromeClient() {
                @Override
                public void onPermissionRequest(PermissionRequest request) {
                  // Auto-grant semua izin (mikrofon, kamera, dll)
                  request.grant(request.getResources());
                }
              });

              w.loadUrl("https://alifavif-cmd.github.io/CHENEL-HT/");
            }

            // ── KUNCI: jangan pause WebView saat layar mati / app minimize ──
            @Override protected void onPause() {
              super.onPause();
              // SENGAJA tidak memanggil w.onPause()
              // Agar PubNub WebSocket & WebRTC tetap hidup saat layar mati
            }

            @Override protected void onResume() {
              super.onResume();
              if (w != null) w.onResume();
            }

            @Override
            public void onInit(int status) {
              if (status == TextToSpeech.SUCCESS) {
                int result = tts.setLanguage(new Locale("id", "ID"));
                if (result == TextToSpeech.LANG_MISSING_DATA ||
                    result == TextToSpeech.LANG_NOT_SUPPORTED) {
                  tts.setLanguage(Locale.getDefault());
                }
                tts.setSpeechRate(0.88f);
                tts.setPitch(1.15f);
                ttsReady = true;
              }
            }

            @Override public void onBackPressed() {
              if (w != null && w.canGoBack()) w.goBack();
              else super.onBackPressed();
            }

            @Override protected void onDestroy() {
              // Bebaskan WakeLock
              if (wakeLock != null && wakeLock.isHeld()) wakeLock.release();
              // Stop service
              stopService(new Intent(this, RadioService.class));
              // Bersihkan TTS
              if (tts != null) { tts.stop(); tts.shutdown(); }
              super.onDestroy();
            }
          }'''
          open('app/src/main/java/com/htjulianto/app/MainActivity.java','w').write(java)
          PYEOF

          # ── RadioService.java ─────────────────────────────────────────
          python3 << 'PYEOF'
          svc = r'''package com.htjulianto.app;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.os.Build;
          import android.os.IBinder;

          public class RadioService extends Service {
            private static final String CH_ID  = "ht_radio_ch";
            private static final int    NF_ID  = 101;

            @Override
            public void onCreate() {
              super.onCreate();
              createChannel();

              // Intent buka MainActivity saat notifikasi diketuk
              Intent open = new Intent(this, MainActivity.class);
              open.setFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP);
              PendingIntent pi = PendingIntent.getActivity(
                this, 0, open,
                Build.VERSION.SDK_INT >= 23
                  ? PendingIntent.FLAG_IMMUTABLE
                  : 0
              );

              Notification.Builder nb;
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                nb = new Notification.Builder(this, CH_ID);
              } else {
                nb = new Notification.Builder(this);
                nb.setPriority(Notification.PRIORITY_LOW);
              }
              nb.setContentTitle("HT Julianto")
                .setContentText("Radio aktif di latar belakang")
                .setSmallIcon(android.R.drawable.ic_btn_speak_now)
                .setOngoing(true)
                .setContentIntent(pi);

              startForeground(NF_ID, nb.build());
            }

            // START_STICKY: service akan dihidupkan ulang otomatis jika dibunuh Android
            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
              return START_STICKY;
            }

            @Override
            public IBinder onBind(Intent intent) { return null; }

            private void createChannel() {
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                NotificationChannel ch = new NotificationChannel(
                  CH_ID,
                  "HT Radio Aktif",
                  NotificationManager.IMPORTANCE_LOW
                );
                ch.setDescription("Menjaga koneksi radio tetap aktif");
                ch.setSound(null, null);
                getSystemService(NotificationManager.class).createNotificationChannel(ch);
              }
            }
          }'''
          open('app/src/main/java/com/htjulianto/app/RadioService.java','w').write(svc)
          PYEOF

          # ── strings.xml & styles.xml ──────────────────────────────────
          python3 << 'PYEOF'
          strings = '''<?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">HT Julianto</string>
          </resources>'''
          open('app/src/main/res/values/strings.xml','w').write(strings)
          styles = '''<?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"/>
          </resources>'''
          open('app/src/main/res/values/styles.xml','w').write(styles)
          PYEOF

      - name: Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          python3 << 'PYEOF'
          props = """distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists"""
          open('gradle/wrapper/gradle-wrapper.properties','w').write(props)
          PYEOF
          gradle wrapper

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: HT-Julianto-APK
          path: app/build/outputs/apk/debug/app-debug.apk
